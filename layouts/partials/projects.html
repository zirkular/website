<article class="vip-project" itemscope itemtype="http://schema.org/CreativeWork">
  <header>
    <h2 itemprop="name">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h2>
  </header>
  <div class="thumbnail" itemprop="thumbnail">
    <img src="{{ .Params.thumbnail }}">
  </div>
  <meta itemprop="inLanguage" content="{{ .Site.LanguageCode }}">
  <meta itemprop="datePublished" content="{{ dateFormat "2006-01-02T15:04:05-07:00" (default .Date (.PublishDate)) }}">
  <meta itemprop="dateModified" content="{{ .Lastmod.Format "2006-01-02T15:04:05-07:00" }}">
  {{ with .Params.images }}
    <meta itemprop="image" content="{{ .Params.thumbnail }}">
  {{ end }}
</article>
